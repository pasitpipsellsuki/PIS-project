name: Deploy to Cloudflare

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    name: Deploy API to Cloudflare Workers
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./PIS

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./PIS
          command: deploy --env production

  deploy-frontend:
    runs-on: ubuntu-latest
    name: Deploy Frontend to Cloudflare Pages
    needs: deploy-api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install PIS Dependencies (includes wrangler)
        run: npm ci
        working-directory: ./PIS

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: ./PIS/src/frontend

      - name: Build Frontend
        run: npm run build
        working-directory: ./PIS/src/frontend
        env:
          VITE_API_URL: https://pis-project-prod.pasit-pip.workers.dev

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy src/frontend/dist --project-name=pis-project --branch=master
        working-directory: ./PIS
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
