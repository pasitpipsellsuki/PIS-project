name = "pis-project"
main = "src/index.ts"
compatibility_date = "2024-02-08"

# Build configuration - Install dependencies before deploying
[build]
command = "npm install"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "pis-project-db"
database_id = "305a38f5-34c1-49a4-b796-9b0a16a6dfe3"

# Environment variables
[env.production]
name = "pis-project-prod"

[env.uat]
name = "pis-project-uat"

# Note: Credentials stored in .env.local (NOT committed to Git)
