name = "pis-project"
main = "src/index.ts"
compatibility_date = "2024-02-08"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "pis-uat-db"
database_id = ""  # Will be updated after creating database

# Routes
routes = [
  { pattern = "pis-api.pasitpipsellsuki.workers.dev", custom_domain = false }
]

# Environment variables
[env.production]
name = "pis-project-prod"

[env.uat]
name = "pis-project-uat"
